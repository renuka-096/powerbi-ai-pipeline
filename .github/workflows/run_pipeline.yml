name: Automated AI Data Pipeline

on:
  schedule:
    - cron: '0 9 * * 1' # Automates engine run every Monday at 9:00 AM UTC
  workflow_dispatch: # Injects a manual trigger button within GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest`
    steps:
    - name: Clone Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pandas openai openpyxl

    - name: Run Pipeline Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python ai_dashboard_pipeline.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add automated_sales_data.xlsx
        git commit -m "Automated update: AI data refreshed" || echo "No changes"
        git push